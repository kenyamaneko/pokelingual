name: Terraform

on:
  # required status check (Terraform Format Check / Terraform Plan) が全 PR で発火する必要があるため、
  # paths フィルタは使わず、job 側の if で skip させて必ず結論を報告させる。
  pull_request:
    branches: [main]

# 同一 ref での連続実行は最新のみ残す (コスト削減)
concurrency:
  group: terraform-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Terraform Change
    runs-on: ubicloud-standard-2
    timeout-minutes: 5
    outputs:
      terraform: ${{ steps.detect.outputs.terraform_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # terraform を変更しない PR でも required check を報告する必要があるため、常に走らせて
      # job 側の if で skip 判定に使う (skip も branch protection では合格扱いになる)。
      - name: Detect terraform change
        id: detect
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          base="${PR_BASE_SHA}"
          # base が解決できない (force push 等) ときは判定できないので実行に倒す
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "terraform_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          terraform_changed_files=$(git diff --name-only "$base" HEAD -- terraform/)
          if [ -n "$terraform_changed_files" ]; then
            echo "terraform_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "terraform_changed=false" >> "$GITHUB_OUTPUT"
          fi

  terraform-check:
    name: Terraform Format Check
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubicloud-standard-2
    timeout-minutes: 5
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive .

  terraform-plan:
    name: Terraform Plan (dev)
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubicloud-standard-2
    timeout-minutes: 10
    environment: dev
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TERRAFORM_PLAN_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -backend-config=environments/dev/backend.gcs.tfbackend

      - name: Terraform plan
        run: |
          {
            echo '```'
            terraform plan -input=false -no-color -lock=false -var-file=environments/dev/terraform.tfvars
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
