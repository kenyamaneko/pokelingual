name: CI

on:
  pull_request:
    branches: [main, develop]
    # コード・CI 設定に影響しない変更では実行しない (コスト削減)
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "rules/**"
      - ".claude/**"
      - ".vscode/**"
  workflow_call:

# 同一 ref での連続実行は最新のみ残す (コスト削減)
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubicloud-standard-2
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Firestore Emulator は Java ランタイムを必要とする。firebase-tools が emulator jar を担うため gcloud は不要。
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # ローカル (Makefile:test-backend) と同一コマンドにし、CI とテスト実行経路を乖離させない。
      - name: Run tests (Firestore emulator)
        run: npx firebase emulators:exec --only firestore --project pokelingual-test "npm test"

      # テスト成否に関わらず JUnit XML を artifact 化する (レポート収集がテスト結果を隠さないよう always)。
      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/test-results/junit.xml
          retention-days: 7

  frontend-test:
    name: Frontend Tests
    runs-on: ubicloud-standard-2
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      # テスト成否に関わらず JUnit XML を artifact 化する (レポート収集がテスト結果を隠さないよう always)。
      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: frontend/test-results/junit.xml
          retention-days: 7

      - name: Build
        run: npm run build

  e2e-test:
    name: E2E Tests
    runs-on: ubicloud-standard-2
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Start services
        run: docker compose -f docker-compose.dev.yml up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:15151 > /dev/null 2>&1; do sleep 2; done'
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:15100/health > /dev/null 2>&1; do sleep 2; done'
          echo "Services ready"

      - name: Run E2E tests
        working-directory: frontend
        env:
          E2E_MODE: local
        run: npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.dev.yml down

  terraform-check:
    name: Terraform Format Check
    runs-on: ubicloud-standard-2
    timeout-minutes: 5
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive .
