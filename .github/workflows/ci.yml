name: CI

on:
  # required status check (ruleset main-protection) が全 PR で発火する必要があるため、
  # paths-ignore は設定しない (docs のみの PR がチェック待ちのままマージ不可になるのを防ぐ)。
  pull_request:
    branches: [main]
  workflow_call:

# 同一 ref での連続実行は最新のみ残す (コスト削減)
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Code Change
    runs-on: ubicloud-standard-2
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # paths-ignore はトリガー自体を止めるため、無視対象のみの変更では required check が
      # 一度も報告されず branch protection が永久にブロックする。job 側の if で skip させて
      # 必ず何らかの結論 (skipped も含む) を報告させるための判定に使う。
      - name: Detect code change
        id: detect
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          base="${PR_BASE_SHA:-$PUSH_BEFORE_SHA}"
          # base が解決できない (force push 等) ときは判定できないので全実行に倒す
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # deploy-*.yml は main への push でのみ実行され PR CI では走らないので、変更してもテストで検証できない。
          # PR で変更版がそのまま走る ci.yml / terraform.yml は除外せず、変更がテストに反映されるようにする。
          changed_files=$(git diff --name-only "$base" HEAD -- . \
            ':(exclude)*.md' ':(exclude)docs/**' ':(exclude)rules/**' \
            ':(exclude).claude/**' ':(exclude).vscode/**' \
            ':(exclude).github/workflows/deploy-*.yml' \
            ':(exclude).gitignore' ':(exclude)LICENSE')
          if [ -n "$changed_files" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  backend-lint:
    name: Backend Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubicloud-standard-2
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  frontend-lint:
    name: Frontend Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubicloud-standard-2
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  backend-test:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubicloud-standard-2
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Firestore Emulator は Java ランタイムを必要とする。firebase-tools が emulator jar を担うため gcloud は不要。
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # ローカル (Makefile:coverage-backend) と同一コマンドにし、CI とテスト実行経路を乖離させない。
      - name: Run tests with coverage (Firestore emulator)
        run: npx firebase emulators:exec --only firestore --project pokelingual-test "npm run test:coverage"

      # 同一 run 内でテスト観点カタログを組むためだけに使うので保持は最短にする。
      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend
          path: backend/test-results/junit.xml
          retention-days: 1

      # 同一 run 内でカバレッジページを組むためだけに使うので保持は最短にする。
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage
          retention-days: 1

  frontend-test:
    name: Frontend Tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubicloud-standard-2
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      # ローカル (Makefile:coverage-frontend) と同一コマンドにし、CI とテスト実行経路を乖離させない。
      - name: Run tests with coverage
        run: npm run test:coverage

      # 同一 run 内でテスト観点カタログを組むためだけに使うので保持は最短にする。
      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        with:
          name: junit-frontend
          path: frontend/test-results/vitest-junit.xml
          retention-days: 1

      # 同一 run 内でカバレッジページを組むためだけに使うので保持は最短にする。
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage
          retention-days: 1

      - name: Build
        run: npm run build

  e2e-test:
    name: E2E Tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubicloud-standard-2
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Start services
        run: docker compose -f docker-compose.dev.yml up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:15151 > /dev/null 2>&1; do sleep 2; done'
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:15100/health > /dev/null 2>&1; do sleep 2; done'
          echo "Services ready"

      - name: Run E2E tests
        working-directory: frontend
        env:
          E2E_MODE: local
        run: npx playwright test

      # 同一 run 内でテスト観点カタログを組むためだけに使うので保持は最短にする。
      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        with:
          name: junit-e2e
          path: frontend/test-results/e2e-junit.xml
          retention-days: 1

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.dev.yml down
