name: CI

on:
  pull_request:
    branches: [main, develop]
    # コード・CI 設定に影響しない変更では実行しない (コスト削減)
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "rules/**"
      - ".claude/**"
      - ".vscode/**"
  workflow_call:

# 同一 ref での連続実行は最新のみ残す (コスト削減)
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubicloud-standard-2
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Firestore Emulator は Java ランタイムを必要とする。firebase-tools が emulator jar を担うため gcloud は不要。
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # ローカル (Makefile:test-backend) と同一コマンドにし、CI とテスト実行経路を乖離させない。
      - name: Run tests (Firestore emulator)
        run: npx firebase emulators:exec --only firestore --project pokelingual-test "npm test"

      # 振る舞いカタログ (docs/adr/014) の生成元。同一 run 内でのみ使うため保持は最短にする。
      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend
          path: backend/test-results/junit.xml
          retention-days: 1

  frontend-test:
    name: Frontend Tests
    runs-on: ubicloud-standard-2
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      # 振る舞いカタログ (docs/adr/014) の生成元。同一 run 内でのみ使うため保持は最短にする。
      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        with:
          name: junit-frontend
          path: frontend/test-results/vitest-junit.xml
          retention-days: 1

      - name: Build
        run: npm run build

  e2e-test:
    name: E2E Tests
    runs-on: ubicloud-standard-2
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Start services
        run: docker compose -f docker-compose.dev.yml up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:15151 > /dev/null 2>&1; do sleep 2; done'
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:15100/health > /dev/null 2>&1; do sleep 2; done'
          echo "Services ready"

      - name: Run E2E tests
        working-directory: frontend
        env:
          E2E_MODE: local
        run: npx playwright test

      # 振る舞いカタログ (docs/adr/014) の生成元。同一 run 内でのみ使うため保持は最短にする。
      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        with:
          name: junit-e2e
          path: frontend/test-results/e2e-junit.xml
          retention-days: 1

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.dev.yml down

  # 全テストの JUnit XML からテスト済みの振る舞い一覧を組み、job summary に出す (docs/adr/014)。
  # PR レビューで振る舞いの増減を確認できるようにする。
  behavior-catalog:
    name: Behavior Catalog
    needs: [backend-test, frontend-test, e2e-test]
    runs-on: ubicloud-standard-2
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pytest
        run: pip install pytest

      - name: Run catalog generator unit tests
        run: python -m pytest scripts

      - name: Download JUnit XML
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: junit-artifacts

      - name: Generate catalog and publish to job summary
        run: |
          python scripts/generate_behavior_catalog.py \
            --format markdown \
            --section "backend:junit-artifacts/junit-backend/junit.xml" \
            --section "frontend:junit-artifacts/junit-frontend/vitest-junit.xml" \
            --section "E2E:junit-artifacts/junit-e2e/e2e-junit.xml" \
            >> "$GITHUB_STEP_SUMMARY"

  terraform-check:
    name: Terraform Format Check
    runs-on: ubicloud-standard-2
    timeout-minutes: 5
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive .
