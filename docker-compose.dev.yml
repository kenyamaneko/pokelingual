services:
  backend:
    build: ./backend
    ports:
      - "15100:15100"
    environment:
      APP_MODE: mock
      PORT: "15100"
      FRONTEND_URL: http://localhost:15151

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "15151:15151"
    environment:
      VITE_APP_MODE: mock
      VITE_ENVIRONMENT: local
      VITE_API_BASE_URL: http://localhost:15100
